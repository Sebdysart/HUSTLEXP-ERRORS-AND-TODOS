name: Monthly Error Summary
on:
  schedule:
    - cron: '0 9 1 * *'
  workflow_dispatch:

permissions:
  issues: write

jobs:
  summary:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Generate Summary
        run: |
          echo "## Monthly Error Summary - $(date +'%B %Y')" > /tmp/summary.md
          echo "" >> /tmp/summary.md
          for f in *.md; do
            if [ "$f" != "README.md" ]; then
              count=$(grep -c "^\- \|^- \[" "$f" 2>/dev/null || echo "0")
              echo "- **$f**: $count items" >> /tmp/summary.md
            fi
          done
          echo "" >> /tmp/summary.md
          echo "Generated: $(date -u +'%Y-%m-%dT%H:%M:%SZ')" >> /tmp/summary.md
      - name: Create Issue
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh issue create \
            --title "Monthly Error Summary - $(date +'%B %Y')" \
            --body "$(cat /tmp/summary.md)" \
            --label "monthly-summary"
